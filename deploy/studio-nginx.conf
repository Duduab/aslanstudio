# Nginx reverse proxy for Next.js (PM2 → http://127.0.0.1:3000).
#
# INSTALL (paths are typical for Ubuntu/Debian; adjust if your Hostinger image differs):
#   1. Replace YOUR_DOMAIN.com (and www) below.
#   2. sudo cp deploy/studio-nginx.conf /etc/nginx/sites-available/studio-booking
#   3. sudo ln -sf /etc/nginx/sites-available/studio-booking /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. SSL: sudo apt install certbot python3-certbot-nginx
#      sudo certbot --nginx -d YOUR_DOMAIN.com -d www.YOUR_DOMAIN.com
#      (Certbot usually patches this file with ssl_certificate paths.)
#
# upstream must match the port in ecosystem.config.js (default 3000).

upstream studio_booking_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # ACME HTTP-01 (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # After certificates exist, prefer redirecting HTTP → HTTPS (Certbot often adds this).
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://studio_booking_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # --- Security headers (tune for your product) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # --- Optional SEO / crawl hint (remove if you use meta robots in HTML only) ---
        # add_header X-Robots-Tag "all" always;
    }
}

