# Deploy to Hostinger VPS over SSH: pull, install, build, PM2 reload.
# Required GitHub Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_PATH
# Optional: VPS_PORT (default 22), VPS_SSH_PASSPHRASE (if key is encrypted)

name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — pull, build, PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Omit port to use 22. For a custom SSH port, add: port: 2222
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            npm ci
            npm run build
            if pm2 describe studio-rent >/dev/null 2>&1; then
              pm2 reload ecosystem.config.js --only studio-rent --env production --update-env
            else
              pm2 start ecosystem.config.js --only studio-rent --env production
            fi
            pm2 save
